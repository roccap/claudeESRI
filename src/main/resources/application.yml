# ---------------------------------------------------------------------------
# Default profile (used for local development)
# H2 in-memory database, verbose logging.
# ---------------------------------------------------------------------------
spring:
  application:
    name: map-application
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:mapdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  # Flyway owns the schema on PostgreSQL (staging/prod); dev uses H2 with
  # Hibernate ddl-auto, so it is disabled here and enabled per-profile below.
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: map-app
      auto-offset-reset: latest
    listener:
      # Do not start listeners during context refresh: a missing/unresolvable
      # broker would otherwise abort app startup. KafkaListenerStarter starts
      # them after the app is ready, tolerating a broker that is not yet up.
      auto-startup: false

server:
  port: 8080

# Live symbol stream consumed from Kafka and pushed to the browser via SSE.
# Disable the consumer with app.kafka.enabled=false when no broker is available.
app:
  kafka:
    enabled: ${KAFKA_ENABLED:true}
    symbols-topic: ${SYMBOLS_TOPIC:map-symbols}

# ArcGIS API key exposed to the front-end via /api/v1/map/config so the
# arcgis/* basemaps render. Supplied by the ARCGIS_API_KEY environment
# variable; empty when unset (only key-free basemaps like OSM then work).
arcgis:
  api-key: ${ARCGIS_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.appmcore: DEBUG

---
# ---------------------------------------------------------------------------
# dev profile — quick local runs with H2 in-memory, DEBUG logging.
# ---------------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:mapdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update

logging:
  level:
    root: INFO
    com.appmcore: DEBUG

---
# ---------------------------------------------------------------------------
# staging profile — PostgreSQL, connection pool of 10.
# ---------------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: staging
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/mapdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:mapapp}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 10
      pool-name: map-app-pool
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO
    com.appmcore: INFO

---
# ---------------------------------------------------------------------------
# prod profile — PostgreSQL, connection pool of 30, WARN logging.
# ---------------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/mapdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:mapapp}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 30
      pool-name: map-app-pool
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: WARN
    com.appmcore: WARN
