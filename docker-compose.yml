# Local Kafka broker for the live map-symbol stream.
#
#   docker compose up -d
#
# The app reads KAFKA_BOOTSTRAP_SERVERS (default localhost:9092). Two listeners
# are advertised so the broker is reachable both from the host (localhost:9092)
# and from other containers on the map-net network (kafka:19092).
#
# Produce a test symbol from the host:
#   docker exec -i kafka /opt/kafka/bin/kafka-console-producer.sh \
#     --bootstrap-server localhost:9092 --topic map-symbols
#   > {"id":"a1","latitude":51.51,"longitude":-0.12,"shape":"triangle","color":"#1E88E5"}
services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:19092,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - map-net

networks:
  map-net:
    name: map-net
